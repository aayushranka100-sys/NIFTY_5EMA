name: Nifty 5 EMA Alert Bot

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Nifty 5 EMA Bot
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python Bot.py

      - name: Save Signal Log to Repo
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "Nifty Bot"
          git add signal_log.json -f 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Bot state update [$(TZ='Asia/Kolkata' date +'%H:%M IST')]"
          git push || echo "Nothing to push"
